name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest discover -s tests -v
      - run: node tests/test_claim_policy.js
      - run: python -m compileall -q agent server shared agent_gui.py run_agent.py run_server.py
